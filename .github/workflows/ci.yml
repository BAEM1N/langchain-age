name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check langchain_age/ tests/
      - run: mypy langchain_age/ --ignore-missing-imports

  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v

  test-integration:
    runs-on: ubuntu-latest
    env:
      LANGCHAIN_AGE_TEST_DSN: "host=localhost port=5432 dbname=langchain_age user=langchain password=langchain"
    steps:
      - uses: actions/checkout@v4

      # Build and start the same Docker image used locally (AGE + pgvector)
      - name: Build and start DB container
        run: |
          docker compose -f docker/docker-compose.yml up -d --build
          # Wait for healthy (service name: postgres-age)
          for i in $(seq 1 30); do
            if docker compose -f docker/docker-compose.yml exec -T postgres-age pg_isready -U langchain; then
              break
            fi
            sleep 2
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -e ".[dev]"
          pip install "apache-age-python @ git+https://github.com/apache/age.git#subdirectory=drivers/python"
      - run: pytest tests/integration/ -v

      - name: Stop DB container
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and smoke test (base + vector + graph)
        run: bash scripts/smoke_build.sh
